<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            color: #171717;
        }

        .container {
            max-width: 28rem;
            width: 100%;
        }

        .card {
            background-color: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            border: 1px solid #e5e5e5;
        }

        .header {
            background-color: #171717;
            padding: 2rem 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header-gradient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom right, #262626, black);
            opacity: 0.5;
            z-index: 0;
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 10;
        }

        .header h1 {
            font-size: 1.875rem;
            font-weight: 700;
            color: white;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .header p {
            color: #a3a3a3;
            font-size: 0.875rem;
        }

        .form {
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #404040;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 0.625rem 1rem;
            background-color: #fafafa;
            border: 1px solid #e5e5e5;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: all 0.2s;
            outline: none;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            ring: 2px solid #171717;
            border-color: #171717;
            box-shadow: 0 0 0 2px rgba(23, 23, 23, 0.2);
        }

        .form-group input::placeholder {
            color: #a3a3a3;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper select {
            appearance: none;
        }

        .select-icon {
            position: absolute;
            inset-y: 0;
            right: 0;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            pointer-events: none;
        }

        .select-icon svg {
            width: 1rem;
            height: 1rem;
            color: #737373;
        }

        .button-container {
            padding-top: 0.5rem;
        }

        .submit-btn {
            width: 100%;
            background-color: #171717;
            color: white;
            font-weight: 500;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            font-size: 1rem;
        }

        .submit-btn:hover {
            background-color: black;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .submit-btn:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(23, 23, 23, 0.3);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .footer {
            background-color: #fafafa;
            padding: 1rem 1.5rem;
            text-align: center;
            border-top: 1px solid #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .footer span {
            font-size: 1.25rem;
        }

        .footer p {
            font-size: 0.75rem;
            color: #737373;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="header-gradient"></div>
                <div class="header-content">
                    <h1>Product Registration</h1>
                    <p>Sign up to activate your warranty and unlock exclusive perks.</p>
                </div>
            </div>
            
            <form class="form" id="registrationForm">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input 
                        type="text" 
                        id="fullName" 
                        placeholder="Jane Doe"
                        data-testid="input-name"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        placeholder="jane@example.com"
                        data-testid="input-email"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="product">Product Model</label>
                    <div class="select-wrapper">
                        <select id="product" data-testid="select-product" required>
                            <option value="Standard">Standard</option>
                            <option value="Pro">Pro</option>
                            <option value="Ultra">Ultra</option>
                        </select>
                        <div class="select-icon">
                            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                            </svg>
                        </div>
                    </div>
                </div>

                <div class="button-container">
                    <button type="submit" class="submit-btn" data-testid="button-submit">
                        Complete Registration
                    </button>
                </div>
            </form>
            
            <div class="footer">
                <span>✨</span>
                <p>This design was brought to life by your AI model companion.</p>
                <span>✨</span>
            </div>
        </div>
    </div>

    <script>
        // Auto-focus on page load
        window.addEventListener('load', function() {
            document.getElementById('fullName').focus();
        });

        // Handle form submission
        document.getElementById('registrationForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const product = document.getElementById('product').value;

            alert(`Product Registration Details:\nName: ${name}\nEmail: ${email}\nModel: ${product}`);
        });
    </script>
</body>
</html>
